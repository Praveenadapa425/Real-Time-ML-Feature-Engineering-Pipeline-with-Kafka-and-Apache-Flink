version: '3.8'

services:
  # ==========================================================
  # Zookeeper Service
  # ==========================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==========================================================
  # Kafka Broker Service
  # ==========================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      # Satisfies requirement to check if topics can be listed
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ==========================================================
  # Kafka Topic Initialization Helper
  # ==========================================================
  init-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      # Inlined init-topics script logic to guarantee setup in compose environment
      echo 'Waiting for Kafka broker to accept topic commands...'
      until kafka-topics --bootstrap-server kafka:29092 --list > /dev/null 2>&1; do
        sleep 2
      done
      
      echo 'Creating user-events topic with 3 partitions...'
      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic user-events \
        --partitions 3 \
        --replication-factor 1

      echo 'Creating content-metadata topic (compacted)...'
      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic content-metadata \
        --partitions 1 \
        --replication-factor 1 \
        --config cleanup.policy=compact \
        --config delete.retention.ms=100 \
        --config min.cleanable.dirty.ratio=0.01 \
        --config segment.ms=10000

      echo 'Creating feature-store topic (compacted)...'
      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic feature-store \
        --partitions 1 \
        --replication-factor 1 \
        --config cleanup.policy=compact \
        --config delete.retention.ms=100 \
        --config min.cleanable.dirty.ratio=0.01 \
        --config segment.ms=10000

      echo 'Creating flink-metrics topic...'
      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic flink-metrics \
        --partitions 1 \
        --replication-factor 1

      echo 'Topics created successfully!'
      kafka-topics --bootstrap-server kafka:29092 --list
    
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list | grep -q user-events"]
      interval: 5s
      timeout: 5s
      retries: 3

  # ==========================================================
  # Flink JobManager Service
  # ==========================================================
  flink-jobmanager:
    image: flink:1.18.1-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    healthcheck:
      # Checks Flink's JobManager web UI endpoint
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # Flink TaskManager Service
  # ==========================================================
  flink-taskmanager:
    image: flink:1.18.1-java11
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep TaskManager | grep -v grep"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # Flink Job Submitter Service
  # ==========================================================
  flink-job-submitter:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    container_name: flink-job-submitter
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_USER_EVENTS: ${KAFKA_TOPIC_USER_EVENTS}
      KAFKA_TOPIC_CONTENT_METADATA: ${KAFKA_TOPIC_CONTENT_METADATA}
      KAFKA_TOPIC_FEATURE_STORE: ${KAFKA_TOPIC_FEATURE_STORE}
      KAFKA_TOPIC_METRICS: ${KAFKA_TOPIC_METRICS}
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 10s
      retries: 1

  # ==========================================================
  # Custom Producer Service (Phase 2 implementation)
  # ==========================================================
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_USER_EVENTS: ${KAFKA_TOPIC_USER_EVENTS}
      KAFKA_TOPIC_CONTENT_METADATA: ${KAFKA_TOPIC_CONTENT_METADATA}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "producer.py"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # Observability Dashboard Service (Phase 4 implementation)
  # ==========================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_FEATURE_STORE: ${KAFKA_TOPIC_FEATURE_STORE}
      KAFKA_TOPIC_METRICS: ${KAFKA_TOPIC_METRICS}
      PORT: ${DASHBOARD_PORT}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 10s
      timeout: 5s
      retries: 5
